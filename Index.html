    --neon: #7dffb3;
    --neon-2: #7d9bff;
    --text-muted: #9aa4b2;

  body{
    background: radial-gradient(circle at top, #141b2b 0%, var(--bg) 60%);

    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;

  .navbar-brand{

  }
  header.hero{
    padding: 3rem 0 2rem;
    text-align: center;
  }
  header.hero h1{
    font-weight: 800;
    text-shadow: 0 0 18px rgba(125,255,179,.35);
  }
  header.hero p{
    color: var(--text-muted);
  }
  .game-card{
    background: var(--bg-alt);
    border: 1px solid rgba(125,255,179,.12);
    border-radius: .9rem;
    padding: 1.1rem;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .game-card:hover{
    transform: translateY(-4px);
    border-color: rgba(125,255,179,.5);
    box-shadow: 0 10px 25px rgba(0,0,0,.4), 0 0 20px rgba(125,255,179,.08);
  }
  .game-title{
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    min-height: 2.6em;
  }
  .btn-buy{
    background: linear-gradient(90deg, var(--neon), var(--neon-2));
    border: none;
    color: #06110b;
    font-weight: 700;
    border-radius: .6rem;
    padding: .55rem 1rem;
    width: 100%;
  }
  .btn-buy:hover{
    filter: brightness(1.1);
    color: #06110b;
  }
  .search-bar{
    max-width: 480px;
    margin: 0 auto 2rem;
  }
  footer{
    text-align: center;
    color: var(--text-muted);
    padding: 2rem 0;
    font-size: .85rem;

</style>

const grid = document.getElementById('gameGrid');

function renderGames(list){
  grid.innerHTML = '';
  list.forEach(game => {
    const col = document.createElement('div');
    col.className = 'col-6 col-md-4 col-lg-3';
    col.innerHTML = `
      <div class="game-card">
        <div class="game-title">${game.name}</div>
        <button class="btn btn-buy" onclick="window.open('${game.url}', '_blank')">${game.name}</button>
      </div>
    `;
    grid.appendChild(col);
  });
}

renderGames(games);

document.getElementById('searchInput').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  renderGames(games.filter(g => g.name.toLowerCase().includes(term)));
});
